{% extends "base.html" %}

{% block title %}BloodBank - Request Blood{% endblock %}

{% block content %}
<!-- Form container: neumorphic-base rounded-3xl p-8 max-w-2xl mx-auto relative -->
<div class="neu-base rounded-3xl p-8 max-w-2xl mx-auto relative border border-white/5 shadow-2xl space-y-6">
    <div class="glass-highlight"></div>

    <!-- Header -->
    <div class="flex items-center space-x-3 border-b border-white/10 pb-4">
        <a href="{{ url_for('user.dashboard') }}" class="text-gray-400 hover:text-white transition-colors">
            <span class="material-symbols-outlined text-2xl">arrow_back</span>
        </a>
        <div>
            <!-- Form title: headline-lg text-white + subtitle body-md text-gray-400 -->
            <h2 class="text-headline-lg font-headline-lg text-white">Submit Blood Request</h2>
            <p class="text-body-md font-body-md text-gray-400 mt-1">Request units for immediate medical or clinical needs.</p>
        </div>
    </div>

    <!-- Form -->
    <form action="{{ url_for('requests.submit') }}" method="POST" class="space-y-4">
        <!-- Requester Name (Editable) -->
        <div class="space-y-2">
            <label for="requester_name" class="font-label-bold text-label-bold text-gray-400 uppercase tracking-wider block">Requester Name</label>
            <input type="text" id="requester_name" name="requester_name" value="{{ current_user.name }}" required
                class="w-full px-4 py-3.5 neumorphic-inset rounded-xl text-white placeholder-gray-500 border-none outline-none focus:ring-2 focus:ring-primary/50 transition-all font-body-md text-body-md bg-transparent">
        </div>

        <!-- Row: Blood Group & Quantity -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Blood Group -->
            <div class="space-y-2">
                <label for="blood_group" class="font-label-bold text-label-bold text-gray-400 uppercase tracking-wider block">Blood Group</label>
                <select id="blood_group" name="blood_group" required onchange="performStockCheck()"
                    class="w-full px-4 py-3.5 neumorphic-inset rounded-xl text-white placeholder-gray-500 border-none outline-none focus:ring-2 focus:ring-primary/50 transition-all font-body-md text-body-md bg-surface cursor-pointer">
                    <option value="" disabled selected class="text-gray-500">Select blood type</option>
                    {% for bg in blood_groups %}
                        <option value="{{ bg }}">{{ bg }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Quantity Required -->
            <div class="space-y-2">
                <label for="quantity" class="font-label-bold text-label-bold text-gray-400 uppercase tracking-wider block">Quantity (Units)</label>
                <input type="number" id="quantity" name="quantity" required min="1" max="10" value="1" oninput="performStockCheck()"
                    class="w-full px-4 py-3.5 neumorphic-inset rounded-xl text-white placeholder-gray-500 border-none outline-none focus:ring-2 focus:ring-primary/50 transition-all font-body-md text-body-md bg-transparent">
                <!-- Quantity field helper text -->
                <p class="font-body-md text-body-md text-primary/70 mt-1 text-sm italic">Note: 1 Unit = 350ml</p>
            </div>
        </div>

        <!-- Real-time Stock Indicator -->
        <div id="stock-indicator-area" class="hidden font-body-md text-body-md text-sm">
            <!-- Populated dynamically via Javascript -->
        </div>

        <!-- Hospital Name -->
        <div class="space-y-2">
            <label for="hospital_name" class="font-label-bold text-label-bold text-gray-400 uppercase tracking-wider block">Hospital Name</label>
            <input type="text" id="hospital_name" name="hospital_name" required placeholder="Mercy General Hospital"
                class="w-full px-4 py-3.5 neumorphic-inset rounded-xl text-white placeholder-gray-500 border-none outline-none focus:ring-2 focus:ring-primary/50 transition-all font-body-md text-body-md bg-transparent">
        </div>

        <!-- Required Date -->
        <div class="space-y-2">
            <label for="required_date" class="font-label-bold text-label-bold text-gray-400 uppercase tracking-wider block">Required Date</label>
            <input type="date" id="required_date" name="required_date" required
                class="w-full px-4 py-3.5 neumorphic-inset rounded-xl text-white placeholder-gray-500 border-none outline-none focus:ring-2 focus:ring-primary/50 transition-all font-body-md text-body-md bg-surface text-gray-300">
        </div>

        <!-- Urgency Level -->
        <div class="space-y-2.5">
            <label class="font-label-bold text-label-bold text-gray-400 uppercase tracking-wider block">Urgency Level</label>
            <div class="grid grid-cols-3 gap-3">
                <!-- Normal -->
                <div onclick="selectUrgency('Normal')" id="card-urgency-Normal" data-val="Normal"
                     class="flex flex-col items-center justify-center p-3 rounded-xl border border-white/5 cursor-pointer select-none transition-all neu-radio-card ring-2 ring-primary bg-primary/20 text-primary">
                    <input type="radio" name="urgency" value="Normal" checked class="hidden">
                    <span class="text-xs font-label-bold text-label-bold uppercase tracking-wider">Normal</span>
                </div>
                <!-- Urgent -->
                <div onclick="selectUrgency('Urgent')" id="card-urgency-Urgent" data-val="Urgent"
                     class="flex flex-col items-center justify-center p-3 rounded-xl border border-white/5 cursor-pointer select-none transition-all neu-radio-card text-gray-400 hover:text-white bg-transparent">
                    <input type="radio" name="urgency" value="Urgent" class="hidden">
                    <span class="text-xs font-label-bold text-label-bold uppercase tracking-wider">Urgent</span>
                </div>
                <!-- Emergency -->
                <div onclick="selectUrgency('Emergency')" id="card-urgency-Emergency" data-val="Emergency"
                     class="flex flex-col items-center justify-center p-3 rounded-xl border border-white/5 cursor-pointer select-none transition-all neu-radio-card text-gray-400 hover:text-white bg-transparent">
                    <input type="radio" name="urgency" value="Emergency" class="hidden">
                    <span class="text-xs font-label-bold text-label-bold uppercase tracking-wider">Emergency</span>
                </div>
            </div>
        </div>

        <!-- Notes -->
        <div class="space-y-2">
            <label for="notes" class="font-label-bold text-label-bold text-gray-400 uppercase tracking-wider block">Notes & Indications</label>
            <textarea id="notes" name="notes" rows="3" placeholder="Case details, specific instructions..."
                class="w-full px-4 py-3.5 neumorphic-inset rounded-xl text-white placeholder-gray-500 border-none outline-none focus:ring-2 focus:ring-primary/50 transition-all font-body-md text-body-md bg-transparent"></textarea>
        </div>

        <!-- Submit Buttons -->
        <div class="pt-4 flex space-x-4">
            <a href="{{ url_for('user.dashboard') }}" 
               class="w-1/2 bg-white/5 hover:bg-white/10 text-gray-300 font-label-bold text-label-bold py-3.5 rounded-xl border border-white/5 text-center transition-all active:scale-95">
                CANCEL
            </a>
            <!-- Submit button: glass-button-primary btn-shimmer ... -->
            <button type="submit" 
               class="w-1/2 glass-button-primary btn-shimmer text-white font-label-bold text-label-bold py-3.5 rounded-xl text-center hover:scale-105 active:scale-95 transition-all shadow-lg">
                SUBMIT REQUEST
            </button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const dateInput = document.getElementById("required_date");
        const today = new Date().toISOString().split('T')[0];
        dateInput.min = today;
    });

    function selectUrgency(val) {
        document.querySelectorAll('.neu-radio-card').forEach(card => {
            const radio = card.querySelector('input');
            if (card.getAttribute('data-val') === val) {
                card.className = "flex flex-col items-center justify-center p-3 rounded-xl border border-white/5 cursor-pointer select-none transition-all neu-radio-card ring-2 ring-primary bg-primary/20 text-primary";
                radio.checked = true;
            } else {
                card.className = "flex flex-col items-center justify-center p-3 rounded-xl border border-white/5 cursor-pointer select-none transition-all neu-radio-card text-gray-400 hover:text-white bg-transparent";
                radio.checked = false;
            }
        });
    }

    function performStockCheck() {
        const bgSelect = document.getElementById("blood_group");
        const qtyInput = document.getElementById("quantity");
        const indicator = document.getElementById("stock-indicator-area");
        
        const bloodGroup = bgSelect.value;
        const quantity = qtyInput.value;
        
        if (!bloodGroup || !quantity || quantity < 1) {
            indicator.classList.add("hidden");
            return;
        }

        fetch(`/requests/api/check-stock?blood_group=${encodeURIComponent(bloodGroup)}&quantity=${encodeURIComponent(quantity)}`)
            .then(res => res.json())
            .then(data => {
                indicator.classList.remove("hidden");
                if (data.status === 'available') {
                    // Available: bg-green-500/20 text-green-400 rounded-xl px-4 py-2 flex items-center gap-2
                    indicator.className = "bg-green-500/20 text-green-400 rounded-xl px-4 py-2 flex items-center gap-2 border border-green-500/30 shadow-sm";
                    indicator.innerHTML = `<span class="material-symbols-outlined text-sm">check_circle</span> <span>Stock available! Current units in inventory: ${data.available}</span>`;
                } else {
                    // Insufficient: bg-error/20 text-error rounded-xl px-4 py-2 flex items-center gap-2 animate-pulse
                    indicator.className = "bg-error/20 text-error rounded-xl px-4 py-2 flex items-center gap-2 border border-error/30 shadow-sm animate-pulse";
                    indicator.innerHTML = `<span class="material-symbols-outlined text-sm">warning</span> <span>Only ${data.available} units available in stock. Your request will be flagged for priority verification.</span>`;
                }
            })
            .catch(err => {
                console.error("Stock check error:", err);
                indicator.classList.add("hidden");
            });
    }
</script>
{% endblock %}
