services:
  - type: web
    name: bloodbank-web
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: flask db upgrade && gunicorn run:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bloodbank-postgres
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production

databases:
  - name: bloodbank-postgres
    databaseName: bloodbank_db
    plan: free
